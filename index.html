<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Utama</title>
    <style>
        .center {
            display: flex;
            justify-content: center; /* Mengatur posisi horizontal di tengah */
            align-items: center; /* Mengatur posisi vertikal di tengah */
            height: 12
            0vh; /* Menggunakan tinggi viewport untuk mengisi seluruh ketinggian layar */
        }
    </style>
</head>
<body>
    <h1>Selamat datang di Halaman Utama</h1>
    <p>Silakan pilih salah satu tautan di bawah ini:</p>
    
    <ul>
        <li><a href="jsdasar.html">Belajar JavaScript Dasar</a></li>
        <li><a href="form.html">Form Pendaftaran</a></li>
        <div id="judul-carousel" class="center">
            <h3>Ini adalah gambar Carousel</h3>
        </div>
        
    </ul>
    
    <div id="carousel" class="center">
        <img src="1.jfif" alt="Image 1">
        <img src="2.jfif" alt="Image 2">
        <img src="3.jfif" alt="Image 3">
        <img src="4.jfif" alt="Image 3">
    </div>

    <script>
        let currentIndex = 0;
        const images = document.querySelectorAll('#carousel img');
        const totalImages = images.length;

        function showImage(index) {
            images.forEach((img, i) => {
                if (i === index) {
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }
            });
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % totalImages;
            showImage(currentIndex);
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + totalImages) % totalImages;
            showImage(currentIndex);
        }

        showImage(currentIndex);

        setInterval(nextImage, 3000); // Ganti gambar setiap 3 detik
        
    </script>

    <!-- <script src="script.js"></script> -->
    
</body>
</html>
